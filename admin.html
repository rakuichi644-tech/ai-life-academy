<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>予約管理 | あいらいふ（AI LIFE）</title>
    <meta name="robots" content="noindex" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header" aria-label="サイトヘッダー">
      <a class="brand" href="index.html#top" aria-label="あいらいふ トップへ">
        <img class="brand-mark" src="assets/ai-life-icon.jpg" alt="" />
        <span>あいらいふ</span>
      </a>
      <nav class="nav" aria-label="主要ナビゲーション">
        <a href="booking.html">予約ページ</a>
        <a href="index.html#curriculum">カリキュラム</a>
        <a href="index.html#faq">FAQ</a>
      </nav>
      <button class="menu-button" type="button" aria-label="メニューを開く" aria-expanded="false">
        <span></span>
        <span></span>
      </button>
    </header>

    <main class="booking-page">
      <section class="booking-hero">
        <div class="section-inner">
          <p class="eyebrow">Booking Admin</p>
          <h1>予約管理</h1>
          <p class="lead">
            運営側で説明会の希望日程を追加・削除し、残席や満員御礼の表示を管理できます。
            Apps ScriptのURLと管理キーを設定して使います。
          </p>
        </div>
      </section>

      <section class="section" aria-labelledby="admin-settings-title">
        <div class="section-inner admin-layout">
          <form class="booking-form admin-settings" id="adminSettings">
            <div class="section-heading">
              <p class="eyebrow">Settings</p>
              <h2 id="admin-settings-title">接続設定</h2>
            </div>
            <label>
              <span>Apps Script URL</span>
              <input type="url" name="apiEndpoint" placeholder="https://script.google.com/macros/s/..." required />
            </label>
            <label>
              <span>管理キー</span>
              <input type="password" name="adminKey" autocomplete="current-password" required />
            </label>
            <button class="button primary" type="submit">設定を保存して読み込む</button>
            <p class="form-help">管理キーはApps ScriptのScript Propertiesに設定する値と同じものを使います。</p>
          </form>

          <form class="booking-form" id="slotForm">
            <div class="section-heading">
              <p class="eyebrow">New Slot</p>
              <h2>日程を追加</h2>
            </div>
            <div class="form-grid">
              <label>
                <span>日付表示</span>
                <input type="text" name="date" placeholder="7月10日（金）" required />
              </label>
              <label>
                <span>時間表示</span>
                <input type="text" name="time" placeholder="20:00〜21:00" required />
              </label>
              <label>
                <span>週ラベル</span>
                <input type="text" name="weekLabel" placeholder="7月10日（金）〜7月16日（木）" required />
              </label>
              <label>
                <span>定員</span>
                <input type="number" name="capacity" min="1" value="5" required />
              </label>
            </div>
            <label>
              <span>メモ</span>
              <input type="text" name="note" value="オンラインZoom説明会" />
            </label>
            <label class="consent-check">
              <input type="checkbox" name="isPublic" checked />
              <span>予約ページに公開する</span>
            </label>
            <button class="button primary" type="submit">日程を追加する</button>
            <p class="form-status" id="adminStatus" hidden></p>
          </form>
        </div>
      </section>

      <section class="section muted" aria-labelledby="slot-list-title">
        <div class="section-inner">
          <div class="section-heading center">
            <p class="eyebrow">Slots</p>
            <h2 id="slot-list-title">登録済み日程</h2>
            <p>削除すると予約ページの候補から外れます。残席0の枠は満員御礼として表示されます。</p>
          </div>
          <div class="admin-slot-list" id="adminSlotList">
            <p class="slot-loading">接続設定を保存すると日程を読み込みます。</p>
          </div>
        </div>
      </section>
    </main>

    <script src="booking-slots.js"></script>
    <script src="script.js"></script>
    <script src="admin.js"></script>
  </body>
</html>
